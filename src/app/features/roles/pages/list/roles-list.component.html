<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Gestión de Roles</h1>
      <p class="page-subtitle">Define permisos y control de acceso.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openCreateModal()" [disabled]="loading">
      + Crear Rol
      </button>
    </div>
  </div>

  <div *ngIf="error" class="error-alert">
    {{ error }}
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <span>Cargando roles...</span>
  </div>

  <div *ngIf="!loading && roles.length === 0" class="empty-state">
    <p>No hay roles creados</p>
  </div>

  <div *ngIf="!loading && roles.length > 0" class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Sistema</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let role of roles">
          <td>{{ role.name }}</td>
          <td>{{ role.description || '-' }}</td>
          <td>
            <span *ngIf="role.is_system" class="badge badge-system">Sí</span>
            <span *ngIf="!role.is_system" class="badge badge-custom">No</span>
          </td>
          <td class="actions-cell">
            <button class="btn btn-secondary" (click)="openEditModal(role)">
              ✏️ Editar
            </button>
            <button class="btn btn-ghost btn-info" (click)="openPermissionsModal(role)">
              🔐 Permisos
            </button>
            <button
              *ngIf="!role.is_system"
              class="btn btn-ghost btn-danger"
              (click)="deleteRole(role)"
            >
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Role Modal (Create/Edit) -->
<app-role-modal
  *ngIf="showRoleModal"
  [role]="editingRole"
  (close)="closeRoleModal()"
  (save)="onRoleSaved()"
></app-role-modal>

<!-- Role Permissions Modal -->
<app-role-permissions-modal
  *ngIf="showPermissionsModal && selectedRoleForPermissions"
  [role]="selectedRoleForPermissions"
  (close)="closePermissionsModal()"
  (save)="onPermissionsSaved()"
></app-role-permissions-modal>
