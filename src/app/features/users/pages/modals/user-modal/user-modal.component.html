<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEditing ? 'Editar Usuario' : 'Crear Nuevo Usuario' }}</h2>
      <button class="btn-close" (click)="onClose()">✕</button>
    </div>

    <div class="modal-body">
      <div *ngIf="error" class="error-alert">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name">Nombre *</label>
          <input
            id="name"
            type="text"
            [(ngModel)]="formData.name"
            name="name"
            placeholder="ej. Juan Pérez"
            required
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            placeholder="ej. juan@example.com"
            required
            [disabled]="loading"
          />
        </div>

        <div *ngIf="!isEditing" class="form-group">
          <label for="password">Contraseña *</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="formData.password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            required
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input
            id="phone"
            type="tel"
            [(ngModel)]="formData.phone"
            name="phone"
            placeholder="ej. +56 9 1234 5678"
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="role">Rol</label>
          <select
            id="role"
            [(ngModel)]="selectedRoleId"
            name="role"
            [disabled]="loading || loadingRoles"
          >
            <option [value]="null">-- Seleccionar Rol --</option>
            <option *ngFor="let role of roles" [value]="role.id">
              {{ role.name }}
            </option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="onClose()" [disabled]="loading">
            Cancelar
          </button>
          <button type="submit" class="btn-primary" [disabled]="loading || loadingRoles">
            {{ loading ? 'Guardando...' : isEditing ? 'Actualizar Usuario' : 'Crear Usuario' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
