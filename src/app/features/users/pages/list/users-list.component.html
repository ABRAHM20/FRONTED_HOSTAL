<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Gestión de Usuarios</h1>
      <p class="page-subtitle">Administra accesos y estado de los usuarios.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openCreateModal()" [disabled]="loading">
      + Crear Usuario
      </button>
    </div>
  </div>

  <div *ngIf="error" class="error-alert">
    {{ error }}
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <span>Cargando usuarios...</span>
  </div>

  <div *ngIf="!loading && users.length === 0" class="empty-state">
    <p>No hay usuarios creados</p>
  </div>

  <div *ngIf="!loading && users.length > 0" class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Roles</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <div class="roles-list">
              <span *ngFor="let role of user.roles" class="role-badge">
                {{ role.name }}
              </span>
              <span *ngIf="!user.roles || user.roles.length === 0" class="role-badge empty">
                Sin rol
              </span>
            </div>
          </td>
          <td>
            <span *ngIf="user.is_active" class="badge badge-active">Activo</span>
            <span *ngIf="!user.is_active" class="badge badge-inactive">Inactivo</span>
          </td>
          <td class="actions-cell">
            <button class="btn btn-secondary" (click)="openEditModal(user)">
              ✏️ Editar
            </button>
            <button 
              class="btn btn-ghost" 
              [class.btn-warning]="user.is_active"
              [class.btn-success]="!user.is_active"
              (click)="toggleUserActive(user)"
            >
              {{ user.is_active ? '🔒 Desactivar' : '🔓 Activar' }}
            </button>
            <button class="btn btn-ghost btn-danger" (click)="deleteUser(user)">
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && total > limit" class="pagination">
    <button class="btn btn-ghost" (click)="previousPage()" [disabled]="skip === 0">
      ← Anterior
    </button>
    <span class="pagination-info">Página {{ (skip / limit) + 1 }} de {{ Math.ceil(total / limit) }}</span>
    <button class="btn btn-ghost" (click)="nextPage()" [disabled]="skip + limit >= total">
      Siguiente →
    </button>
  </div>
</div>

<!-- User Modal (Create/Edit) -->
<app-user-modal
  *ngIf="showUserModal"
  [user]="editingUser"
  (close)="closeUserModal()"
  (save)="onUserSaved()"
></app-user-modal>
