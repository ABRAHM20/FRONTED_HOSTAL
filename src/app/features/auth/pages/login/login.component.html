<section class="card">
  <div class="brand-block">
    <img class="brand-logo" src="assets/branding/logo.png" alt="Hotel Suite" />
    <div class="brand-text">
      <h1>Hotel Suite</h1>
      <p>Exclusive & refined luxury</p>
    </div>
  </div>

  <div class="card-intro">
    <h2>Bienvenido</h2>
    <p>Inicia sesion para continuar.</p>
  </div>

  <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>
      Correo
      <input type="email" placeholder="correo@empresa.com" formControlName="email" />
    </label>
    <label>
      Contrasena
      <input type="password" placeholder="********" formControlName="password" />
    </label>
    <button type="submit" [disabled]="form.invalid || loading">Entrar</button>
  </form>

  <p class="error" *ngIf="error">{{ error }}</p>

  <a routerLink="/auth/register">Crear cuenta</a>
</section>
